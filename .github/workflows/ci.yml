# ──────────────────────────────────────────────────────────────────────
# FORGE — GitHub Actions CI pipeline
#
# This runs automatically on every pull request targeting the dev or
# main branches. If tests fail, the workflow goes red and GitHub will
# show it on the PR (you can also require it to pass before merging
# via Settings → Branches → Branch protection rules).
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=forge --cov-report=term-missing
