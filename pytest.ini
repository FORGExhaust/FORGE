# Configuration for pytest
# https://docs.pytest.org/en/stable/reference/reference.html#ini-options-ref

[pytest]
# Discover tests in the "tests/" directory
testpaths = tests

# Only collect files matching these patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary info and verbose output
addopts =
    -v
    --tb=short
    -ra

# Register custom markers so pytest doesn't warn about them
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that need data files on disk
